name: Savemore CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      demo_failure:
        description: "Set to true to intentionally fail the pipeline for debugging screenshots"
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

jobs:
  build-checks:
    name: GitHub Actions Build Checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Print CI debug context
        run: |
          echo "Event: ${{ github.event_name }}"
          echo "Branch/ref: ${{ github.ref }}"
          echo "Commit SHA: ${{ github.sha }}"
          echo "Repository: ${{ github.repository }}"
          echo "Actor: ${{ github.actor }}"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run lint checks
        run: npm run lint

      - name: Build production assets
        run: npm run build

      - name: Build Docker image without pushing
        run: docker build -t savemore-frontend:ci .

      - name: Intentional failure demo
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.demo_failure == 'true' }}
        run: |
          echo "This step intentionally fails so evaluators can see CI error logs."
          exit 1

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: savemore-dist
          path: dist
          if-no-files-found: error
